name: ci
on: [push, pull_request]
jobs:
  test:
    # Linux-раннер: бесплатные минуты. seedsplit — чистая логика (shellcheck +
    # vendor-check + bats); macOS-примитивы стабятся PATH-стабами в тестах.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: Lint
        run: shellcheck seedsplit install.sh tools/vendor-common.sh
      - name: Vendored common is in sync with pinned securetrash
        run: ./tools/vendor-common.sh --check
      - name: Unit tests
        run: bats test/

  windows:
    # Windows-порт (PowerShell, BETA): чистая логика Shamir/GF — Pester на windows-latest.
    # Включает KAT-кросс-совместимость долей с macOS-сборкой (один формат SSS2).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
      - name: Pester (seedsplit.ps1 logic + installer integrity gate)
        shell: pwsh
        run: |
          $r = Invoke-Pester windows/test -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed" }
